# API Gateway - Tienda Digital
# Patron: API Gateway con SSO (JWT validado en cada microservicio).
# Patron: Rate Limit en /auth/login.
# Patron: Correlation ID propagado a todos los servicios.
#
# Convencion de locations: usar prefijos SIN slash final. Cada location reescribe
# el path con un capture grupo opcional ((/.*)?$) de manera que el servicio recibe
# la URL "limpia" tanto si el cliente puso slash al final como si no, evitando los
# 301 que Nginx genera automaticamente y los 307 de FastAPI con redirect_slashes.

upstream auth_service      { server auth-service:8001; }
upstream catalog_service   { server catalog-service:8002; }
upstream inventory_service { server inventory-service:8003; }
upstream commerce_service  { server commerce-service:8004; }
upstream payment_service   { server payment-service:8005; }

# Mapa para generar Correlation ID si no viene
map $http_x_correlation_id $correlation_id {
  default $http_x_correlation_id;
  ""      $request_id;
}

server {
  listen 80;
  server_name _;

  # Cabeceras de seguridad (Security Monkey)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # CORS - permite que el frontend Vite (5173) consuma el API
  add_header Access-Control-Allow-Origin  "$http_origin" always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-Id, Idempotency-Key" always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Access-Control-Max-Age 3600 always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # Propagacion estandar a todos los proxies
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Correlation-Id  $correlation_id;
  proxy_read_timeout 30s;
  proxy_connect_timeout 5s;

  # El gateway centraliza CORS. Los microservicios tambien exponen CORS para
  # ejecucion directa en desarrollo; al pasar por Nginx esas cabeceras duplican
  # Access-Control-Allow-Origin y Chrome bloquea las respuestas.
  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Methods;
  proxy_hide_header Access-Control-Allow-Headers;
  proxy_hide_header Access-Control-Allow-Credentials;
  proxy_hide_header Access-Control-Max-Age;

  # ---------------------------------------------------------------------------
  # Healthchecks por servicio (utiles para Doctor Monkey y para validar bloques)
  # ---------------------------------------------------------------------------
  location = /health/gateway   { return 200 '{"status":"ok","service":"api-gateway"}\n'; add_header Content-Type application/json; }
  location = /health/auth      { proxy_pass http://auth_service/health; }
  location = /health/catalog   { proxy_pass http://catalog_service/health; }
  location = /health/inventory { proxy_pass http://inventory_service/health; }
  location = /health/commerce  { proxy_pass http://commerce_service/health; }
  location = /health/payment   { proxy_pass http://payment_service/health; }

  # ---------------------------------------------------------------------------
  # Auth Service (con rate limit para login)
  # ---------------------------------------------------------------------------
  location = /api/auth/login {
    limit_req zone=auth_zone burst=5 nodelay;
    rewrite ^/api/auth/(.*)$ /$1 break;
    proxy_pass http://auth_service;
  }
  location /api/auth {
    rewrite ^/api/auth(/.*)?$ $1 break;
    proxy_pass http://auth_service;
  }
  location /api/users {
    rewrite ^/api/users(/.*)?$ /users$1 break;
    proxy_pass http://auth_service;
  }

  # ---------------------------------------------------------------------------
  # Catalog Service
  # ---------------------------------------------------------------------------
  location /api/catalog {
    rewrite ^/api/catalog(/.*)?$ /catalog$1 break;
    proxy_pass http://catalog_service;
  }
  location /api/products {
    rewrite ^/api/products(/.*)?$ /products$1 break;
    proxy_pass http://catalog_service;
  }
  location /api/categories {
    rewrite ^/api/categories(/.*)?$ /categories$1 break;
    proxy_pass http://catalog_service;
  }
  location /api/store {
    rewrite ^/api/store(/.*)?$ /store$1 break;
    proxy_pass http://catalog_service;
  }
  location /api/uploads {
    rewrite ^/api/uploads(/.*)?$ /uploads$1 break;
    proxy_pass http://catalog_service;
  }

  # ---------------------------------------------------------------------------
  # Inventory Service
  # ---------------------------------------------------------------------------
  location /api/inventory {
    rewrite ^/api/inventory(/.*)?$ $1 break;
    proxy_pass http://inventory_service;
  }
  location /api/variants {
    rewrite ^/api/variants(/.*)?$ /variants$1 break;
    proxy_pass http://inventory_service;
  }

  # ---------------------------------------------------------------------------
  # Commerce Service (carrito, checkout, pedidos, reviews, notificaciones)
  # ---------------------------------------------------------------------------
  location /api/cart {
    rewrite ^/api/cart(/.*)?$ /cart$1 break;
    proxy_pass http://commerce_service;
  }
  location /api/checkout {
    rewrite ^/api/checkout(/.*)?$ /checkout$1 break;
    proxy_pass http://commerce_service;
  }
  location /api/orders {
    rewrite ^/api/orders(/.*)?$ /orders$1 break;
    proxy_pass http://commerce_service;
  }
  location /api/reviews {
    rewrite ^/api/reviews(/.*)?$ /reviews$1 break;
    proxy_pass http://commerce_service;
  }
  location /api/notifications {
    rewrite ^/api/notifications(/.*)?$ /notifications$1 break;
    proxy_pass http://commerce_service;
  }

  # ---------------------------------------------------------------------------
  # Payment Service (mayormente interno; expuesto para healthcheck/admin)
  # ---------------------------------------------------------------------------
  location /api/payments {
    rewrite ^/api/payments(/.*)?$ /payments$1 break;
    proxy_pass http://payment_service;
  }

  # ---------------------------------------------------------------------------
  # Admin (cada microservicio expone sus propias rutas /admin/...)
  # ---------------------------------------------------------------------------
  location /api/admin/upload-image { client_max_body_size 8m; rewrite ^/api/admin/upload-image$ /admin/upload-image break; proxy_pass http://catalog_service; }
  location /api/admin/catalog       { rewrite ^/api/admin/catalog(/.*)?$       /admin/catalog$1       break; proxy_pass http://catalog_service; }
  location /api/admin/products      { rewrite ^/api/admin/products(/.*)?$      /admin/products$1      break; proxy_pass http://catalog_service; }
  location /api/admin/categories    { rewrite ^/api/admin/categories(/.*)?$    /admin/categories$1    break; proxy_pass http://catalog_service; }
  location /api/admin/store         { rewrite ^/api/admin/store(/.*)?$         /admin/store$1         break; proxy_pass http://catalog_service; }
  location /api/admin/messages      { rewrite ^/api/admin/messages(/.*)?$      /admin/messages$1      break; proxy_pass http://catalog_service; }
  location /api/admin/inventory     { rewrite ^/api/admin/inventory(/.*)?$     /admin$1               break; proxy_pass http://inventory_service; }
  location /api/admin/variants      { rewrite ^/api/admin/variants(/.*)?$      /admin/variants$1      break; proxy_pass http://inventory_service; }
  location /api/admin/orders        { rewrite ^/api/admin/orders(/.*)?$        /admin/orders$1        break; proxy_pass http://commerce_service; }
  location /api/admin/employees     { rewrite ^/api/admin/employees(/.*)?$     /admin/employees$1     break; proxy_pass http://commerce_service; }
  location /api/admin/expenses      { rewrite ^/api/admin/expenses(/.*)?$      /admin/expenses$1      break; proxy_pass http://commerce_service; }
  location /api/admin/finance       { rewrite ^/api/admin/finance(/.*)?$       /admin/finance$1       break; proxy_pass http://commerce_service; }
  location /api/admin/audit-logs    { rewrite ^/api/admin/audit-logs(/.*)?$    /admin/audit-logs$1    break; proxy_pass http://commerce_service; }
  location /api/admin/reviews       { rewrite ^/api/admin/reviews(/.*)?$       /admin/reviews$1       break; proxy_pass http://commerce_service; }
  location /api/admin/notifications { rewrite ^/api/admin/notifications(/.*)?$ /admin/notifications$1 break; proxy_pass http://commerce_service; }
  location /api/admin/customers     { rewrite ^/api/admin/customers(/.*)?$     /admin/customers$1     break; proxy_pass http://auth_service; }
  location /api/admin/access-logs   { rewrite ^/api/admin/access-logs(/.*)?$   /admin/access-logs$1   break; proxy_pass http://auth_service; }
  location /api/admin/me            { rewrite ^/api/admin/me(/.*)?$            /admin/me$1            break; proxy_pass http://auth_service; }

  # ---------------------------------------------------------------------------
  # Fallback
  # ---------------------------------------------------------------------------
  location / {
    return 404 '{"error":"Ruta no encontrada","gateway":"tienda-digital"}\n';
    add_header Content-Type application/json;
  }
}
